version: 2
updates:
  # Keep Python dependencies current so CVEs get patched promptly.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Keep GitHub Actions pinned and updated (supply-chain hygiene).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
